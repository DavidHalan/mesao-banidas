<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cartas banidas · Mesão</title>
  <meta name="description" content="Lista de cartas banidas da nossa mesa de Commander, com a regra da casa.">
  <link rel="preconnect" href="https://api.scryfall.com">
  <link rel="preconnect" href="https://cards.scryfall.io">
  <link rel="preconnect" href="https://svgs.scryfall.io">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="9"></circle><path d="M5.6 5.6l12.8 12.8"></path>
        </svg>
      </span>
      <span class="brand-text">
        <span class="brand-name" id="brand-name">Mesão</span>
        <span class="brand-sub">Lista negra da mesa</span>
      </span>
    </div>
    <span class="count" id="count" aria-live="polite"></span>
  </header>

  <main>
    <section class="rules" id="rules" aria-labelledby="rules-title">
      <h2 class="rules-title" id="rules-title">Regras da mesa</h2>
      <div class="rules-body" id="rules-body"></div>
    </section>

    <div class="controls" role="search">
      <label class="field search">
        <svg class="field-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path>
        </svg>
        <input type="search" id="search" placeholder="Buscar carta" autocomplete="off" aria-label="Buscar carta pelo nome">
      </label>
      <label class="field">
        <span class="field-label">Agrupar</span>
        <select id="group">
          <option value="type">Tipo</option>
          <option value="mv">Custo de mana</option>
          <option value="ungrouped">Sem grupo</option>
        </select>
      </label>
      <label class="field">
        <span class="field-label">Ordenar</span>
        <select id="sort">
          <option value="name">Nome</option>
          <option value="mv">Custo de mana</option>
        </select>
      </label>
      <div class="field">
        <span class="field-label">Incluindo estas cores</span>
        <div class="colors" id="colors" role="group" aria-label="Filtrar cartas que incluem estas cores">
          <button class="pip" type="button" data-color="W" aria-pressed="false" title="Branco"><img src="https://svgs.scryfall.io/card-symbols/W.svg" alt="Branco" width="20" height="20"></button>
          <button class="pip" type="button" data-color="U" aria-pressed="false" title="Azul"><img src="https://svgs.scryfall.io/card-symbols/U.svg" alt="Azul" width="20" height="20"></button>
          <button class="pip" type="button" data-color="B" aria-pressed="false" title="Preto"><img src="https://svgs.scryfall.io/card-symbols/B.svg" alt="Preto" width="20" height="20"></button>
          <button class="pip" type="button" data-color="R" aria-pressed="false" title="Vermelho"><img src="https://svgs.scryfall.io/card-symbols/R.svg" alt="Vermelho" width="20" height="20"></button>
          <button class="pip" type="button" data-color="G" aria-pressed="false" title="Verde"><img src="https://svgs.scryfall.io/card-symbols/G.svg" alt="Verde" width="20" height="20"></button>
        </div>
      </div>
    </div>

    <div class="notice" id="notice" hidden></div>
    <div id="gallery" aria-live="polite"></div>
  </main>

  <footer class="site-foot">
    Dados e imagens via <a href="https://scryfall.com" target="_blank" rel="noopener">Scryfall</a>.
    Conteúdo de fã, não afiliado à Wizards of the Coast.
  </footer>

  <dialog id="dialog" class="dialog" aria-label="Detalhes da carta">
    <button class="dialog-close" id="dialog-close" type="button" aria-label="Fechar">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M6 6l12 12M18 6L6 18"></path>
      </svg>
    </button>
    <div class="dialog-grid">
      <div class="dialog-art">
        <img id="dlg-img" alt="">
        <button class="flip" id="dlg-flip" type="button" hidden>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M21 3v5h-5"></path>
            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path><path d="M3 21v-5h5"></path>
          </svg>
          Virar
        </button>
      </div>
      <div class="dialog-info">
        <div class="dlg-name" id="dlg-name"></div>
        <div class="dlg-type" id="dlg-type"></div>
        <div class="dlg-text" id="dlg-text"></div>
        <div class="dlg-pt" id="dlg-pt" hidden></div>
        <div class="dlg-meta" id="dlg-meta"></div>
      </div>
    </div>
  </dialog>

  <script src="app.js" defer></script>
</body>
</html>
